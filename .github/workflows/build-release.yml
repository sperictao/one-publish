name: build-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.KEYCHAIN_PASSWORD != '' }}
      HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_CERTIFICATE != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}
      HAS_APPLE_SIGNING: ${{ secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' }}
      TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            tauri_args: "--target aarch64-apple-darwin"
            artifact: macos-aarch64
            bundle_path: src-tauri/target/aarch64-apple-darwin/release/bundle/**
          - os: macos-latest
            tauri_args: "--target x86_64-apple-darwin"
            artifact: macos-x86_64
            bundle_path: src-tauri/target/x86_64-apple-darwin/release/bundle/**
          - os: macos-latest
            tauri_args: "--target universal-apple-darwin"
            artifact: macos-universal
            bundle_path: src-tauri/target/universal-apple-darwin/release/bundle/**
          - os: windows-latest
            tauri_args: ""
            artifact: windows
            bundle_path: src-tauri/target/release/bundle/**
          - os: ubuntu-latest
            tauri_args: ""
            artifact: linux
            bundle_path: src-tauri/target/release/bundle/**

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: "10.10.0"
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Import Apple Developer Certificate
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > "certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "build.keychain"
          security default-keychain -s "build.keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "build.keychain"
          security set-keychain-settings -t 3600 -u "build.keychain"
          security import "certificate.p12" -k "build.keychain" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "build.keychain"
          security find-identity -v -p codesigning "build.keychain"

      - name: Import Windows Certificate
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_CERT == 'true'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType directory -Path "certificate"
          Set-Content -Path "certificate/tempCert.txt" -Value $env:WINDOWS_CERTIFICATE
          certutil -decode "certificate/tempCert.txt" "certificate/certificate.pfx"
          Remove-Item -path "certificate" -include "tempCert.txt"
          Import-PfxCertificate -FilePath "certificate/certificate.pfx" -CertStoreLocation "Cert:\CurrentUser\My" -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (macOS signed)
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_SIGNING == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: pnpm build:updater -- ${{ matrix.tauri_args }}

      - name: Build (macOS unsigned)
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_SIGNING != 'true'
        run: pnpm build:updater -- ${{ matrix.tauri_args }}

      - name: Build
        if: matrix.os != 'macos-latest'
        run: pnpm build:updater -- ${{ matrix.tauri_args }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.artifact }}
          path: ${{ matrix.bundle_path }}
          if-no-files-found: error

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5

      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare updater assets
        run: |
          mkdir -p ./updater-assets
          version="${GITHUB_REF_NAME#v}"

          copy_single() {
            local source_dir="$1"
            local pattern="$2"
            local destination_dir="$3"
            mapfile -d '' matches < <(find "$source_dir" -type f -name "$pattern" -print0)
            if [ "${#matches[@]}" -ne 1 ]; then
              echo "Expected exactly one match for $pattern in $source_dir, found ${#matches[@]}"
              printf '%s\n' "${matches[@]}"
              exit 1
            fi
            cp "${matches[0]}" "$destination_dir/$(basename "${matches[0]}")"
          }

          copy_single_as() {
            local source_dir="$1"
            local pattern="$2"
            local destination_path="$3"
            mapfile -d '' matches < <(find "$source_dir" -type f -name "$pattern" -print0)
            if [ "${#matches[@]}" -ne 1 ]; then
              echo "Expected exactly one match for $pattern in $source_dir, found ${#matches[@]}"
              printf '%s\n' "${matches[@]}"
              exit 1
            fi
            cp "${matches[0]}" "$destination_path"
          }

          copy_single_as ./artifacts/bundles-macos-aarch64 '*.app.tar.gz' "./updater-assets/OnePublish_${version}_aarch64.app.tar.gz"
          copy_single_as ./artifacts/bundles-macos-aarch64 '*.app.tar.gz.sig' "./updater-assets/OnePublish_${version}_aarch64.app.tar.gz.sig"
          copy_single_as ./artifacts/bundles-macos-x86_64 '*.app.tar.gz' "./updater-assets/OnePublish_${version}_x64.app.tar.gz"
          copy_single_as ./artifacts/bundles-macos-x86_64 '*.app.tar.gz.sig' "./updater-assets/OnePublish_${version}_x64.app.tar.gz.sig"
          copy_single ./artifacts/bundles-windows '*.msi' ./updater-assets
          copy_single ./artifacts/bundles-windows '*.msi.sig' ./updater-assets
          copy_single ./artifacts/bundles-linux '*.AppImage' ./updater-assets
          copy_single ./artifacts/bundles-linux '*.AppImage.sig' ./updater-assets

          file_count="$(find ./updater-assets -type f | wc -l | tr -d ' ')"
          if [ "$file_count" -eq 0 ]; then
            echo "No updater assets found."
            exit 1
          fi

          echo "Prepared $file_count updater assets."

      - name: Resolve release notes
        run: |
          release_notes_path="./release-notes/${GITHUB_REF_NAME}.md"
          if [ ! -f "$release_notes_path" ]; then
            echo "Missing release notes file: $release_notes_path"
            exit 1
          fi
          echo "RELEASE_NOTES_PATH=$release_notes_path" >> "$GITHUB_ENV"

      - name: Generate latest updater manifest
        env:
          RELEASE_DOWNLOAD_BASE: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        run: |
          node scripts/generate-latest-json.mjs \
            --input ./updater-assets \
            --output ./updater-assets/latest.json \
            --version "${GITHUB_REF_NAME#v}" \
            --baseUrl "${RELEASE_DOWNLOAD_BASE}" \
            --notes-file "${RELEASE_NOTES_PATH}"

      - name: Prepare release assets
        run: |
          mkdir -p ./release-assets

          copy_single() {
            local source_dir="$1"
            local pattern="$2"
            local destination_dir="$3"
            mapfile -d '' matches < <(find "$source_dir" -type f -name "$pattern" -print0)
            if [ "${#matches[@]}" -ne 1 ]; then
              echo "Expected exactly one match for $pattern in $source_dir, found ${#matches[@]}"
              printf '%s\n' "${matches[@]}"
              exit 1
            fi
            cp "${matches[0]}" "$destination_dir/$(basename "${matches[0]}")"
          }

          copy_single ./updater-assets latest.json ./release-assets
          copy_single ./updater-assets '*aarch64.app.tar.gz' ./release-assets
          copy_single ./updater-assets '*x64.app.tar.gz' ./release-assets
          copy_single ./artifacts/bundles-macos-aarch64 '*aarch64*.dmg' ./release-assets
          copy_single ./artifacts/bundles-macos-x86_64 '*x64*.dmg' ./release-assets
          copy_single ./artifacts/bundles-macos-universal '*universal*.dmg' ./release-assets
          copy_single ./updater-assets '*.msi' ./release-assets
          copy_single ./updater-assets '*.AppImage' ./release-assets
          copy_single ./artifacts/bundles-linux '*.deb' ./release-assets

          file_count="$(find ./release-assets -type f | wc -l | tr -d ' ')"
          if [ "$file_count" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          echo "Prepared $file_count release assets."

      - name: Remove existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release delete "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --yes --cleanup-tag=false
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' files < <(find ./release-assets -type f -print0)
          gh release create "${GITHUB_REF_NAME}" "${files[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${RELEASE_NOTES_PATH}"
